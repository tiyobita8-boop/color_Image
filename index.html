<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラーイメージ診断</title>

<style>
body { font-family: "メイリオ", sans-serif; text-align:center; }

.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  width:420px;
  margin:0 auto;
  text-align:left;
}

label{padding:3px;}
label:hover{background:#eee;cursor:pointer;}

canvas{border:1px solid #ccc;margin-top:20px;}
</style>

</head>
<body>

<h2>イメージ選択</h2>
<div class="container" id="box"></div>

<br>

<button onclick="analyze()">分析する</button>

<div style="margin-top:10px;">
ソフト（＋）⇔ハード（－）（y軸）<br>
ウォーム（－）⇔クール（＋）（x軸）
</div>

<h3 id="result"></h3>
<canvas id="chart" width="300" height="300"></canvas>

<script>

// ワード
const words=[
"甘い","かわいい","ロマンチックな","可憐な","清楚な","さわやかな","やさしい","ゆったりとした","みずみずしい","うるおいのある",
"元気な","楽しい","優美な","エレガントな","若々しい","スポーティな","洗練された","知的な","情熱的な","ドラマチックな",
"魅惑的な","艶っぽい","野性的な","エスニックな","高級な","本格的な","りりしい","マニッシュな","正統な","気高い",
"シャープな","モダンな"
];

// 対応表（完全版）
const map={
"甘い":{x:1,y:1,type:"ソフト"},
"かわいい":{x:1,y:1,type:"ソフト"},
"ロマンチックな":{x:1,y:1,type:"ソフト"},
"可憐な":{x:1,y:1,type:"ソフト"},

"清楚な":{x:-2,y:0,type:"中間"},
"さわやかな":{x:-2,y:0,type:"中間"},

"やさしい":{x:1,y:0,type:"中間"},
"ゆったりとした":{x:1,y:0,type:"中間"},

"みずみずしい":{x:-1,y:0,type:"中間"},
"うるおいのある":{x:-1,y:0,type:"中間"},

"元気な":{x:0,y:0,type:"中間"},
"楽しい":{x:0,y:0,type:"中間"},

"優美な":{x:2,y:-2,type:"中間"},
"エレガントな":{x:2,y:-2,type:"中間"},

"若々しい":{x:-1,y:0,type:"中間"},
"スポーティな":{x:-1,y:0,type:"中間"},

"洗練された":{x:-1,y:0,type:"中間"},
"知的な":{x:-1,y:0,type:"中間"},

"情熱的な":{x:1,y:0,type:"ハード"},
"ドラマチックな":{x:1,y:0,type:"ハード"},

"魅惑的な":{x:1,y:-1,type:"ハード"},
"艶っぽい":{x:1,y:-1,type:"ハード"},

"野性的な":{x:1,y:-1,type:"ハード"},
"エスニックな":{x:1,y:-1,type:"ハード"},

"高級な":{x:2,y:-3,type:"ハード"},
"本格的な":{x:2,y:-3,type:"ハード"},
"りりしい":{x:2,y:-3,type:"ハード"},
"マニッシュな":{x:2,y:-3,type:"ハード"},
"正統な":{x:2,y:-3,type:"ハード"},
"気高い":{x:2,y:-3,type:"ハード"},

"シャープな":{x:-2,y:0,type:"ハード"},
"モダンな":{x:-2,y:0,type:"ハード"}
};

// UI生成
const box=document.getElementById("box");
words.forEach(w=>{
  const l=document.createElement("label");
  l.innerHTML=`<input type="checkbox" value="${w}"> ${w}`;
  box.appendChild(l);
});

// 分析
function analyze(){

let hard=0,soft=0,midHS=0;
let warm=0,cool=0,midWC=0;

let x=0,y=0;

document.querySelectorAll("input:checked").forEach(c=>{
  const v=map[c.value];

  x+=v.x;
  y+=v.y;

  if(v.type==="ハード") hard++;
  else if(v.type==="ソフト") soft++;
  else midHS++;

  if(v.x>0) warm++;
  else if(v.x<0) cool++;
  else midWC++;
});

// 判定
let hs = y>0?"ソフトより":y<0?"ハードより":"中間";
let wc = x>0?"ウォームより":x<0?"クールより":"中間";

// 表示
document.getElementById("result").innerHTML=
`ハードの数:${hard}
ソフトの数:${soft}
ウォームの数:${warm}
クールの数:${cool}
ソフトとハードの中間:${midHS}
ウォームとクールの中間:${midWC}

xの数:${x} yの数:${y}

派：${hs}
カラーイメージ：${wc}`;

// グラフ
draw(x,y);
}

// 描画
function draw(x,y){

const ctx=document.getElementById("chart").getContext("2d");
ctx.clearRect(0,0,300,300);

// 軸
ctx.beginPath();
ctx.moveTo(150,0);ctx.lineTo(150,300);
ctx.moveTo(0,150);ctx.lineTo(300,150);
ctx.stroke();

// 範囲制限（-3～+3）
let nx=Math.max(-3,Math.min(3,x));
let ny=Math.max(-3,Math.min(3,y));

// スケール
let px=nx*40;
let py=ny*40;

// 点
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(150+px,150-py,6,0,Math.PI*2);
ctx.fill();

}
</script>

</body>
</html>
