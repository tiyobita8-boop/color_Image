<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラーイメージ診断</title>

<style>
body {
  font-family: "メイリオ", sans-serif;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 420px;
  margin: 0 auto;
  text-align: left;
}

label {
  display: block;
  padding: 4px;
}

label:hover {
  background: #f0f0f0;
  cursor: pointer;
}

canvas {
  border: 1px solid #ccc;
  margin-top: 20px;
}
</style>

</head>

<body>

<h2>イメージ選択</h2>

<div class="container" id="checkboxes"></div>

<br>

<button onclick="analyze()" style="font-size:18px; padding:8px 16px;">
  分析する
</button>

<!-- ★軸説明（修正版） -->
<div style="margin-top:10px; font-size:14px;">
  ソフト（＋）⇔ハード（－）（y軸）<br>
  ウォーム（－）⇔クール（＋）（x軸）
</div>

<h3 id="result"></h3>

<canvas id="chart" width="300" height="300"></canvas>

<script>

// ワード一覧
const words = [
"甘い","かわいい","ロマンチックな","可憐な","清楚な","さわやかな","やさしい","ゆったりとした","みずみずしい","うるおいのある",
"元気な","楽しい","優美な","エレガントな","若々しい","スポーティな","洗練された","知的な","情熱的な","ドラマチックな",
"魅惑的な","艶っぽい","野性的な","エスニックな","高級な","本格的な","りりしい","マニッシュな","正統な","気高い",
"シャープな","モダンな"
];

// 分類ルール
const softList = ["甘い","かわいい","ロマンチックな","可憐な","やさしい","ゆったりとした","みずみずしい","うるおいのある","清楚な"];
const hardList = ["シャープな","モダンな","りりしい","マニッシュな","正統な","気高い","本格的な"];
const middleHSList = ["エレガントな","優美な","高級な","洗練された","知的な"];

const warmList = ["甘い","かわいい","ロマンチックな","元気な","楽しい","情熱的な","野性的な","エスニックな"];
const coolList = ["さわやかな","シャープな","モダンな","知的な","洗練された"];
const middleWCList = ["エレガントな","優美な","高級な","正統な","気高い"];

// チェックボックス生成
const container = document.getElementById("checkboxes");

words.forEach(word => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${word}"> ${word}`;
  container.appendChild(label);
});

// 分析処理
function analyze() {

  const checked = document.querySelectorAll("input:checked");

  let hard=0, soft=0, middleHS=0;
  let warm=0, cool=0, middleWC=0;

  checked.forEach(item => {
    const w = item.value;

    if (softList.includes(w)) soft++;
    else if (hardList.includes(w)) hard++;
    else middleHS++;

    if (warmList.includes(w)) warm++;
    else if (coolList.includes(w)) cool++;
    else middleWC++;
  });

  document.getElementById("result").innerHTML =
    `ハード:${hard} ソフト:${soft} 中間:${middleHS}<br>
     ウォーム:${warm} クール:${cool} 中間:${middleWC}`;

  drawChart(hard, soft, warm, cool);
}

// グラフ描画（★ロジック修正済）
function drawChart(hard, soft, warm, cool) {

  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,300,300);

  // 軸
  ctx.beginPath();
  ctx.moveTo(150,0);
  ctx.lineTo(150,300);
  ctx.moveTo(0,150);
  ctx.lineTo(300,150);
  ctx.stroke();

  // ★表示と一致させた計算
  let x = (cool - warm) * 30;   // クール＋ / ウォーム－
  let y = (soft - hard) * 30;   // ソフト＋ / ハード－

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(150 + x, 150 - y, 6, 0, Math.PI*2);
  ctx.fill();
}

</script>

</body>
</html>
