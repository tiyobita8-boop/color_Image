<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラーイメージ診断</title>

<style>
body { font-family: "メイリオ", sans-serif; text-align:center; }

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  width: 420px;
  margin: 0 auto;
  text-align: left;
}

label { padding: 3px; }
label:hover { background:#eee; cursor:pointer; }

canvas { border:1px solid #ccc; margin-top:20px; }
</style>

</head>
<body>

<h2>イメージ選択</h2>
<div class="container" id="checkboxes"></div>

<br>

<button onclick="analyze()">分析する</button>

<div style="margin-top:10px;">
  ソフト（＋）⇔ハード（－）（y軸）<br>
  ウォーム（－）⇔クール（＋）（x軸）
</div>

<h3 id="result"></h3>

<canvas id="chart" width="300" height="300"></canvas>

<script>

// ワード
const words = [
"甘い","かわいい","ロマンチックな","可憐な","清楚な","さわやかな","やさしい","ゆったりとした","みずみずしい","うるおいのある",
"元気な","楽しい","優美な","エレガントな","若々しい","スポーティな","洗練された","知的な","情熱的な","ドラマチックな",
"魅惑的な","艶っぽい","野性的な","エスニックな","高級な","本格的な","りりしい","マニッシュな","正統な","気高い",
"シャープな","モダンな"
];

// 分類辞書（y,x）
const map = {
  "甘い":{y:1,x:1},"かわいい":{y:1,x:1},"ロマンチックな":{y:1,x:1},"可憐な":{y:1,x:1},
  "清楚な":{y:1,x:0},"やさしい":{y:1,x:1},"ゆったりとした":{y:1,x:0},
  "みずみずしい":{y:1,x:1},"うるおいのある":{y:1,x:1},

  "元気な":{y:0,x:1},"楽しい":{y:0,x:1},"情熱的な":{y:0,x:1},
  "野性的な":{y:-1,x:1},"エスニックな":{y:-1,x:1},

  "シャープな":{y:-1,x:-1},"モダンな":{y:-1,x:-1},
  "知的な":{y:-1,x:-1},"洗練された":{y:-1,x:-1},

  "エレガントな":{y:0,x:0},"優美な":{y:0,x:0},"高級な":{y:0,x:0},

  "りりしい":{y:-1,x:0},"マニッシュな":{y:-1,x:0},
  "正統な":{y:0,x:0},"気高い":{y:0,x:0},

  "ドラマチックな":{y:-1,x:1},"魅惑的な":{y:-1,x:1},"艶っぽい":{y:-1,x:1},

  "スポーティな":{y:0,x:1},"若々しい":{y:1,x:1},
  "さわやかな":{y:0,x:-1}
};

// チェック生成
const container = document.getElementById("checkboxes");
words.forEach(w=>{
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${w}"> ${w}`;
  container.appendChild(label);
});

function analyze(){

  const checked = document.querySelectorAll("input:checked");

  let hard=0,soft=0,midHS=0;
  let warm=0,cool=0,midWC=0;

  let xSum=0,ySum=0;

  checked.forEach(c=>{
    const w = c.value;
    const v = map[w] || {y:0,x:0};

    ySum += v.y;
    xSum += v.x;

    if(v.y===1) soft++;
    else if(v.y===-1) hard++;
    else midHS++;

    if(v.x===1) warm++;
    else if(v.x===-1) cool++;
    else midWC++;
  });

  // 判定
  let hsType = ySum > 0 ? "ソフトより" : ySum < 0 ? "ハードより" : "中間";
  let wcType = xSum < 0 ? "クールより" : xSum > 0 ? "ウォームより" : "中間";

  document.getElementById("result").innerHTML =
  `ハード:${hard} ソフト:${soft} ウォーム:${warm} クール:${cool}<br>
   中間HS:${midHS} 中間WC:${midWC}<br>
   x:${xSum} y:${ySum}<br>
   派：${hsType}<br>
   カラーイメージ：${wcType}`;

  drawChart(xSum,ySum);
}

function drawChart(x,y){

  const ctx = document.getElementById("chart").getContext("2d");
  ctx.clearRect(0,0,300,300);

  // 軸
  ctx.beginPath();
  ctx.moveTo(150,0); ctx.lineTo(150,300);
  ctx.moveTo(0,150); ctx.lineTo(300,150);
  ctx.stroke();

  // スケール（±3）
  let px = x * 40;
  let py = y * 40;

  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(150+px,150-py,6,0,Math.PI*2);
  ctx.fill();
}
</script>

</body>
</html>
